<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNIST Digit Recognizer</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
      text-align: center;
    }

    .container {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── Sol panel: çizim ── */
    .draw-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.3);
    }

    #canvas {
      display: block;
      background: #000;
      cursor: crosshair;
      touch-action: none;
    }

    .hint {
      color: #555;
      font-size: 0.78rem;
      text-align: center;
    }

    .btn-clear {
      padding: 10px 36px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn-clear:hover  { opacity: 0.85; }
    .btn-clear:active { transform: scale(0.96); }

    /* ── Sağ panel: sonuçlar ── */
    .result-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 260px;
    }

    .prediction-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 20px 24px;
      text-align: center;
    }

    .pred-label { color: #888; font-size: 0.8rem; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }

    .pred-digit {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.2s;
    }

    .pred-conf {
      color: #48cfad;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 4px;
    }

    .bars-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 16px 20px;
    }

    .bars-title { color: #888; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .bar-label {
      width: 14px;
      text-align: right;
      font-size: 0.8rem;
      color: #aaa;
      font-weight: 600;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: #2a2a4a;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      transition: width 0.25s ease;
      width: 0%;
    }

    .bar-pct {
      width: 38px;
      text-align: right;
      font-size: 0.72rem;
      color: #666;
    }

    .status {
      color: #555;
      font-size: 0.8rem;
      text-align: center;
      padding: 4px 0;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #2a2a4a;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { color: #888; font-size: 0.9rem; }

    footer {
      margin-top: 40px;
      color: #444;
      font-size: 0.75rem;
      text-align: center;
    }
    footer a { color: #6c63ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- Loading ekranı -->
<div id="loading">
  <div class="spinner"></div>
  <p>Model yükleniyor…</p>
</div>

<h1>🔢 Digit Recognizer</h1>
<p class="subtitle">Rakam çiz, yapay zeka tanısın</p>

<div class="container">

  <!-- Çizim alanı -->
  <div class="draw-panel">
    <div class="canvas-wrapper">
      <canvas id="canvas" width="280" height="280"></canvas>
    </div>
    <p class="hint">Mouse veya parmakla çiz</p>
    <button class="btn-clear" onclick="clearCanvas()">Temizle</button>
  </div>

  <!-- Sonuç paneli -->
  <div class="result-panel">

    <div class="prediction-box">
      <div class="pred-label">Tahmin</div>
      <div class="pred-digit" id="pred-digit">?</div>
      <div class="pred-conf" id="pred-conf">—</div>
    </div>

    <div class="bars-box">
      <div class="bars-title">Olasılıklar</div>
      <div id="bars"></div>
    </div>

    <div class="status" id="status">Rakam çizmeye başla…</div>
  </div>
</div>

<footer>
  <a href="https://github.com/metehanulusoy/mnist-digit-recognizer" target="_blank">GitHub'da İncele</a>
  &nbsp;·&nbsp; TensorFlow.js + MNIST
</footer>

<script>
/* ─────────────────────────────────────────
   1) Bar'ları başlat
───────────────────────────────────────── */
const barsContainer = document.getElementById('bars');
for (let i = 0; i < 10; i++) {
  barsContainer.innerHTML += `
    <div class="bar-row">
      <span class="bar-label">${i}</span>
      <div class="bar-track"><div class="bar-fill" id="bar-${i}"></div></div>
      <span class="bar-pct" id="pct-${i}">0%</span>
    </div>`;
}

/* ─────────────────────────────────────────
   2) Modeli yükle
───────────────────────────────────────── */
let model = null;

async function loadModel() {
  try {
    model = await tf.loadLayersModel('model/model.json');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('status').textContent = 'Model hazır — çizmeye başla!';
    console.log('✅ Model yüklendi');
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('status').textContent = '⚠️ Model bulunamadı. Önce python train.py + convert_model.py çalıştır.';
    console.error('Model yükleme hatası:', e);
  }
}
loadModel();

/* ─────────────────────────────────────────
   3) Canvas çizim
───────────────────────────────────────── */
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
let drawing   = false;

ctx.strokeStyle = '#fff';
ctx.lineWidth   = 18;
ctx.lineCap     = 'round';
ctx.lineJoin    = 'round';

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('mousedown',  e => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('mousemove',  e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
canvas.addEventListener('mouseup',    () => { drawing = false; predict(); });
canvas.addEventListener('mouseleave', () => { if (drawing) { drawing = false; predict(); } });

canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); drawing = false; predict(); }, { passive: false });

function clearCanvas() {
  ctx.clearRect(0, 0, 280, 280);
  document.getElementById('pred-digit').textContent = '?';
  document.getElementById('pred-conf').textContent  = '—';
  document.getElementById('status').textContent     = 'Rakam çizmeye başla…';
  for (let i = 0; i < 10; i++) {
    document.getElementById(`bar-${i}`).style.width = '0%';
    document.getElementById(`pct-${i}`).textContent  = '0%';
  }
}

/* ─────────────────────────────────────────
   4) Tahmin
───────────────────────────────────────── */
async function predict() {
  if (!model) return;

  // Canvas içeriğini 28x28'e küçült
  const offscreen = document.createElement('canvas');
  offscreen.width = offscreen.height = 28;
  const offCtx = offscreen.getContext('2d');
  offCtx.drawImage(canvas, 0, 0, 28, 28);

  const imageData = offCtx.getImageData(0, 0, 28, 28);
  const pixels    = imageData.data;

  // RGBA → Gri tonu → normalize (0-1)
  const grayscale = new Float32Array(28 * 28);
  for (let i = 0; i < 28 * 28; i++) {
    grayscale[i] = pixels[i * 4] / 255.0;   // R kanalı (canvas siyah-beyaz)
  }

  // Boş canvas kontrolü
  const sum = grayscale.reduce((a, b) => a + b, 0);
  if (sum < 1) {
    document.getElementById('status').textContent = 'Rakam çizmeye başla…';
    return;
  }

  // Tensor oluştur → tahmin
  const tensor = tf.tensor4d(Array.from(grayscale), [1, 28, 28, 1]);
  const probs  = model.predict(tensor);
  const probsArr = await probs.data();
  tensor.dispose();
  probs.dispose();

  // En yüksek olasılıklı rakam
  const maxIdx  = probsArr.indexOf(Math.max(...probsArr));
  const maxConf = probsArr[maxIdx];

  // UI güncelle
  document.getElementById('pred-digit').textContent = maxIdx;
  document.getElementById('pred-conf').textContent  = `%${(maxConf * 100).toFixed(1)} güven`;
  document.getElementById('status').textContent     = maxConf > 0.9 ? '✅ Çok emin!' : maxConf > 0.6 ? '🤔 Emin değilim…' : '😅 Zor bir rakam!';

  for (let i = 0; i < 10; i++) {
    const pct = (probsArr[i] * 100).toFixed(1);
    document.getElementById(`bar-${i}`).style.width = `${pct}%`;
    document.getElementById(`pct-${i}`).textContent  = `${pct}%`;
    document.getElementById(`bar-${i}`).style.background =
      i === maxIdx ? 'linear-gradient(90deg, #6c63ff, #48cfad)' : '#3a3a5a';
  }
}
</script>
</body>
</html>
